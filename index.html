<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSL style generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .option-group { margin-bottom: 1.5rem; }
        #generated-csl { white-space: pre-wrap; background: #f8f9fa; padding: 1rem; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Customize your citation style</h1>
        <form id="csl-options">

            <div class="option-group">
                <h4>Title formatting</h4>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="title-hanzi" checked>
                    <label class="form-check-label" for="title-italic">(Primary-)Title in Chinese characters</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="title-translation-square" checked>
                    <label class="form-check-label" for="title-quotes">Title translation in square brackets</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="title-translation-curved" checked>
                    <label class="form-check-label" for="title-quotes">Title translation in curved brackets</label>
                </div>
            </div>

            <div class="option-group">
                <h4>Publisher</h4>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="journal-name-hanzi" checked>
                    <label class="form-check-label" for="doi-always">Journal name in Chinese characters</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="journal-translation-square" checked>
                    <label class="form-check-label" for="url-always">Journal name translation in square brackets</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="journal-translation-curved" checked>
                    <label class="form-check-label" for="url-always">Journal name translation in curved brackets</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="publisher-hanzi" checked>
                    <label class="form-check-label" for="url-always">Publisher name in Chinese characters</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="publisher-translation-square" checked>
                    <label class="form-check-label" for="url-always">Publisher name translation in square brackets</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="publisher-translation-curved" checked>
                    <label class="form-check-label" for="url-always">Publisher name translation in curved brackets</label>
                </div>
            </div>

            <button type="button" class="btn btn-primary mt-3" id="generate-btn">Generate style</button>
        </form>

        <div id="download-section" class="mt-4" style="display: none;">
            <h3>Your customized csl-style:</h3>
            <pre id="generated-csl"></pre>
            <a id="download-link" class="btn btn-success mt-2" download="mein-angepasster-stil.csl">Download style file</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
