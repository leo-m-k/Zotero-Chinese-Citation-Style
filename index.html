<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSL-Stil-Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .option-group { margin-bottom: 1.5rem; }
        #generated-csl { white-space: pre-wrap; background: #f8f9fa; padding: 1rem; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">CSL-Stil anpassen</h1>
        <form id="csl-options">
            <div class="option-group">
                <h4>Autorformatierung</h4>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="author-short" checked>
                    <label class="form-check-label" for="author-short">Kurze Autorennamen (Nachname, Vorname)</label>
                </div>
            </div>

            <div class="option-group">
                <h4>Titelformatierung</h4>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="title-italic" checked>
                    <label class="form-check-label" for="title-italic">Titel kursiv</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="title-quotes" checked>
                    <label class="form-check-label" for="title-quotes">Titel in Anführungszeichen</label>
                </div>
            </div>

            <div class="option-group">
                <h4>DOI/URL</h4>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="doi-always" checked>
                    <label class="form-check-label" for="doi-always">DOI immer anzeigen</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="url-always" checked>
                    <label class="form-check-label" for="url-always">URL immer anzeigen</label>
                </div>
            </div>

            <div class="option-group">
                <h4>Zeitschriftenabkürzungen</h4>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="journal-abbrev" checked>
                    <label class="form-check-label" for="journal-abbrev">Zeitschriftennamen abkürzen</label>
                </div>
            </div>

            <button type="button" class="btn btn-primary mt-3" id="generate-btn">Stil generieren</button>
        </form>

        <div id="download-section" class="mt-4" style="display: none;">
            <h3>Dein angepasster CSL-Stil:</h3>
            <pre id="generated-csl"></pre>
            <a id="download-link" class="btn btn-success mt-2" download="mein-angepasster-stil.csl">Stil herunterladen</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
